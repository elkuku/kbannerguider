name: Build APK and Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "VERSION=$(date +'%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Generate HTML coverage report
        run: |
          sudo apt-get install -y lcov
          genhtml coverage/lcov.info \
            --output-directory coverage/html \
            --title "kBannerGuider coverage" \
            --show-details \
            --legend

      - name: Set up signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then exit 0; fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/kbannerguider.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" "kbannerguider.jks" \
            > android/key.properties

      - name: Build APK
        run: flutter build apk --dart-define=APP_VERSION="${{ steps.version.outputs.VERSION }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress docs
        run: npm run docs:build

      - name: Assemble pages
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DIST=docs/.vitepress/dist

          # APK — versioned copy and a stable "latest" link
          cp build/app/outputs/flutter-apk/app-release.apk "${DIST}/kbannerguider-${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "${DIST}/kbannerguider-latest.apk"

          # Coverage report in a subdirectory
          cp -r coverage/html "${DIST}/coverage"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
